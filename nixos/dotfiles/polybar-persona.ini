[colors]

background = ${xrdb:background:#000000}
foreground = ${xrdb:foreground:#ffffff}
color0 = ${xrdb:color0}
color1 = ${xrdb:color1}
color2 = ${xrdb:color2}
color3 = ${xrdb:color3}
color4 = ${xrdb:color4}
color5 = ${xrdb:color5}
color6 = ${xrdb:color6}
color7 = ${xrdb:color7}
color8 = ${xrdb:color8}
color9 = ${xrdb:color9}
color10 = ${xrdb:color10}
color11 = ${xrdb:color11}
color12 = ${xrdb:color12}
color13 = ${xrdb:color13}
color14 = ${xrdb:color14}
color15 = ${xrdb:color15}
accent = ${colors.color1}
secondary = ${colors.color6}

;  _                    
; | |__   __ _ _ __ ___ 
; | '_ \ / _` | '__/ __|
; | |_) | (_| | |  \__ \
; |_.__/ \__,_|_|  |___/

[bar/bar]
enable-ipc=true
height = 45

background = ${colors.background}
;background = ${colors.primary}
foreground = ${colors.foreground}

padding=3
font-0=Fira Code:size=9;3
font-1=CozetteVector:size=9;3
font-2=IPAGothic:size=9;3
font-3=Material Icons:size=13;4
font-4=Sawarabi Gothic:size=9;3

modules-left =  bspwm 
; Spotify (scripts at github.com/dietervanhoof/polybar-spotify-controls)
modules-center = time spotify
; Mpd
modules-right = battery cpu memory wlan pulseaudio

scroll-up = bspwn-wsnext
scroll-down = bspwn-wsprev

wm-restack = bspwm
override-redirect = false

;                      _       _           
;  _ __ ___   ___   __| |_   _| | ___  ___ 
; | '_ ` _ \ / _ \ / _` | | | | |/ _ \/ __|
; | | | | | | (_) | (_| | |_| | |  __/\__ \
; |_| |_| |_|\___/ \__,_|\__,_|_|\___||___/
                                         
[module/xwindow]
type = internal/xwindow
label = %title:0:40:...%
label-color1 = ${colors.foreground} 
label-background = ${colors.background} 
label-padding = 2

[module/bspwm]
type = internal/bspwm
format = <label-state>
format-padding = 2
index-sort = true

enable-click = true
reverse-scroll = false

label-focused = [#]
label-focused-foreground = ${colors.accent}
label-focused-padding = 1

label-occupied = []
label-occupied-padding = 1

label-urgent = [!]
label-urgent-foreground = ${colors.secondary}
label-urgent-padding = 1

label-empty = -
label-empty-padding = 1

label-separator = |
label-separator-foreground = ${colors.color7}


[module/mpd]
type = internal/mpd
host = 127.0.0.1
port = 6600
format-online = "<icon-prev> <toggle> <icon-next> <label-song>"
format-online-foreground = ${colors.color14}
format-online-padding = 2
label-song-padding = 1
label-song = %artist%: %title%

format-offline = <label-offline>
label-offline = no players found
format-offline-foreground = ${colors.color6}

icon-prev = "ÔĀä"
icon-stop = ÔĀć
icon-play = ÔĀč
icon-pause = ÔĀĆ
icon-next = ÔĀé

label-song-maxlen = 45
label-song-ellipsis = true

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôčõ "
format-padding = 2
format-foreground = ${colors.foreground}
label = %percentage%%

[module/memory]
type = internal/memory
interval = 2
format-padding = 2
format-prefix = "ÓÄ® "
format-foreground = ${colors.foreground}
label = %percentage_used%%

[module/wlan]
type = internal/network
interface = wlan0
interval = 3.0
format-connected-margin = 2
format-connected-foreground = ${colors.accent}


format-connected = Ôáę <label-connected>
label-connected = %essid%

format-disconnected = <label-disconnected>
format-disconnected-margin = 2
format-disconnected-foreground = ${colors.foreground}
label-disconnected = %ifname% disconnected

[module/eth]
type = internal/network
interface = eno1
interval = 3.0

format-connected-prefix = "ÓÜú "
format-connected-prefix-color1 = ${colors.color1-alt}
label-connected = %local_ip%

format-disconnected =
;format-disconnected = <label-disconnected>
;format-disconnected-underline = ${self.format-connected-underline}
;label-disconnected = %ifname% disconnected
;label-disconnected-color1 = ${colors.color1-alt}

[module/time]
type = internal/date
interval = 10
format-padding = 3

time = "%H:%M"
date = "%A %d %b"

label = %date%, %time%
label-padding = 2


[module/pulseaudio]
type = internal/pulseaudio

format-volume-margin = 2
format-volume-foreground = ${colors.accent}
format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
use-ui-max = false
interval = 5

ramp-volume-0 = "ÔÄ¶"
ramp-volume-1 = "ÔÄß"
ramp-volume-2 = "ÔÄ®"


format-muted-padding = 2
label-muted = "muted"   
label-muted-background = ${colors.background}
label-muted-foreground = ${colors.foreground}

[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 60

format =  <label>
format-warn = <ramp> <label-warn>

label = %temperature-c%
label-warn = %temperature-c%
label-warn-color1 = ${colors.secondary}

ramp-0 = Ôčč
ramp-1 = ÔčČ
ramp-2 = ÓÉč

[module/powermenu]
type = custom/menu

expand-right = true

format-spacing = 1
format-margin = 0
format-background = ${colors.background}
format-foreground = ${colors.foreground}
format-padding = 2

label-open = ÔÄĎ
label-close = ÔĀó
label-separator = |

; reboot
menu-0-1 = ÔÄě
menu-0-1-exec = menu-open-2
; poweroff
menu-0-2 = ÔÄĎ
menu-0-2-exec = menu-open-3
; logout
menu-0-0 = ÔčĶ
menu-0-0-exec = menu-open-1

menu-2-0 = ÔÄě
menu-2-0-exec = reboot

menu-3-0 = ÔÄĎ
menu-3-0-exec = poweroff

menu-1-0 = ÔčĶ
menu-1-0-exec = i3-msg exit || openbox --exit

;Spotify modules

[module/previous]
type = custom/script
format-font = 2
format-padding = 2
format-foreground = ${colors.foreground}
exec = echo "ÔĀČ"
exec-if = "pgrep spotify"
click-left = "dbus-send --print-reply --dest=org.mpris.MediaPlayer2.spotify /org/mpris/MediaPlayer2 org.mpris.MediaPlayer2.Player.Previous"


[module/next]
type = custom/script
format-font = 2
format-padding = 2
format-foreground = ${colors.foreground}
exec = echo "ÔĀź"
exec-if = "pgrep spotify"
click-left = "dbus-send --print-reply --dest=org.mpris.MediaPlayer2.spotify /org/mpris/MediaPlayer2 org.mpris.MediaPlayer2.Player.Next"

[module/playpause]
type = custom/ipc
format-font = 2
format-padding = 0
format-foreground = ${colors.foreground}
; Default
hook-0 = echo ""
; Playing
hook-1 = echo "ÔĀĆ"
; Paused
hook-2 = echo "ÔĀč"
initial = 2
click-left = "dbus-send --print-reply --dest=org.mpris.MediaPlayer2.spotify /org/mpris/MediaPlayer2 org.mpris.MediaPlayer2.Player.PlayPause"


[module/spotify]
type = custom/script
format = <label>
format-foreground = ${colors.accent}
format-prefix = "Óé° "
exec = python3 ~/.scripts/spotify/spotify_status.py
click-left = dbus-send --print-reply --dest=org.mpris.MediaPlayer2.spotify /org/mpris/MediaPlayer2 org.mpris.MediaPlayer2.Player.PlayPause
interval = 2


[module/battery]
type = internal/battery
format-charging-margin = 2
format-charging-foreground = ${colors.secondary}
format-discharging-margin = 2
format-discharging-foreground = ${colors.foreground}
format-full-margin = 2
format-full-foreground = ${colors.accent}
full-at = 100
time-format = %H:%M
battery = BAT0
adapter = ADP0
format-charging = <animation-charging> <label-charging>
;label-charging = %percentage%% (%time%)
label-charging = %percentage%%
format-discharging = <ramp-capacity> <label-discharging>
;label-discharging = %percentage%% (%time%)
label-discharging = %percentage%%
format-full = <label-full>
;label-charging-underline = ${colors.tertiary}
;label-discharging-underline = ${colors.tertiary}


;format-charging-underline = ${colors.foreground}
;format-discharging-underline = ${colors.foreground}
format-full-prefix = "‚Ėą "
ramp-capacity-0 = "‚ĖĀ "
ramp-capacity-1 = "‚Ėā "
ramp-capacity-2 = "‚ĖÉ "
ramp-capacity-3 = "‚ĖĄ "
ramp-capacity-4 = "‚ĖÖ "

ramp-capacity-0-foreground = ${colors.foreground}
ramp-capacity-foreground   = ${colors.foreground}
bar-capacity-width = 10

animation-charging-0 = "ūüó≤‚ĖĀ "
animation-charging-1 = "ūüó≤‚Ėā "
animation-charging-2 = "ūüó≤‚ĖÉ "
animation-charging-3 = "ūüó≤‚ĖĄ "
animation-charging-4 = "ūüó≤‚ĖÖ "

animation-charging-framerate = 750

label-font = 3

ramp-capacity-0-underline = ${colors.tertiary}
ramp-capacity-1-underline = ${colors.tertiary}
ramp-capacity-2-underline = ${colors.tertiary}
ramp-capacity-3-underline = ${colors.tertiary}
ramp-capacity-4-underline = ${colors.tertiary}

; animation-charging-0-underline = ${colors.tertiary}
; animation-charging-1-underline = ${colors.tertiary}
; animation-charging-2-underline = ${colors.tertiary}
; animation-charging-3-underline = ${colors.tertiary}
; animation-charging-4-underline = ${colors.tertiary}

; Uncomment these for anmated discharging battery underline
; ramp-capacity-0-underline = ${colors.primary}
; ramp-capacity-1-underline = ${colors.primary}
; ramp-capacity-2-underline = ${colors.tertiary}
; ramp-capacity-3-underline = ${colors.tertiary}
; ramp-capacity-4-underline = ${colors.tertiary}


[settings]
screenchange-reload = true
;compositing-background = xor
;compositing-background = screen
;compositing-foreground = source
;compositing-border = over
;pseudo-transparency = true

[global/wm]
margin-top = 0
margin-bottom = 0

; vim:ft=dosini