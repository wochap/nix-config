[colors]
alert = ${xrdb:color3:#bd2c40}
background = ${xrdb:color0:#222}
background-alt = #444
foreground = ${xrdb:color7:#dfdfdf}
foreground-alt = ${xrdb:color7:#555}
primary = ${xrdb:color1:#ffb52a}
secondary = ${xrdb:color2:#e60053}
transparent		= #00000000

[bar/mainbar-bspwm]
font-0 = fixed:pixelsize=10;1
font-1 = unifont:fontformat=truetype:size=8:antialias=false;0
font-2 = siji:pixelsize=10;1
font-3 = "Wuncon Siji"
font-4 = "Font Awesome 5 Free"
font-5 = "Font Awesome 5 Free Solid"
font-6 = "Font Awesome 5 Brands"
font-7 = "FontAwesome"

;TODO: add monitor?
; foreground = ${colors.foreground}
background = ${colors.background}
border-color = ${colors.transparent}
border-size = 10
fixed-center = false
height = 40
padding = 0
width = 100%

modules-left = bspwm spacer xwindow
modules-center = 
modules-right = spacer date

[module/spacer]
type = custom/text
content = ÔĪĘ
content-padding = 0
content-background = ${colors.transparent}
content-foreground = ${colors.transparent}

[module/bspwm]
type = internal/bspwm

pin-workspaces = true
format = <label-state> <label-mode>

label-focused = %icon%
label-focused-background = ${colors.background-alt}
label-focused-underline= ${colors.primary}
label-focused-padding = 2

label-occupied = %index%
label-occupied-padding = 2

label-urgent = %index%!
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

label-empty = %index%
label-empty-foreground = ${colors.foreground-alt}
label-empty-padding = 2

ws-icon-0 = 1;Ôā¨
ws-icon-1 = 2;Ôáč
ws-icon-2 = 3;ÔáĽ
ws-icon-3 = 4;ÔÉÉ
ws-icon-4 = 5;ÔÄĺ
ws-icon-5 = 6;ÔÄĹ
ws-icon-6 = 7;ÔĄČ
ws-icon-7 = 8;ÔĀľ
ws-icon-8 = 9;ÔčÜ
ws-icon-9 = 10;ÔÜį
ws-icon-default = "ÔČ¨ "

[module/date]
type = internal/date
interval = 1
date = ÔĀ≥ %a %b %d
time = ÔÄó %H:%M
label = %date%, %time%
format = <label>
format-padding = 1
format-background = ${colors.background}
format-foreground = ${colors.foreground}

[module/xwindow]
type = internal/xwindow
label = %title%
