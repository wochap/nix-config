#### MONITOR

# monitor=name,resolution,position,scale
monitor = , highres, auto, auto, bitdepth, 8, cm, auto
monitor = , addreserved, 0, 0, 0, 0

# HACK: disable ghost monitor when running Hyprland and other wayland wm
monitor = WAYLAND-1, disable


#### WINDOW

$bitwarden_appid = Bitwarden
$bing_gpt_appid = msedge-www.bing.com__chat-Default
$chat_gpt_appid = chrome-chat.openai.com__-Default
$gemini_appid = chrome-gemini.google.com__app-Default
$ollama_appid = chrome-ollama.wochap.local__-Default
$openwebui_appid = chrome-openwebui.wochap.local__-Default
$ytmusic_appid = chrome-music.youtube.com__-Default

windowrule = suppress_event maximize, match:class .*
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# center all floating
windowrule = center on, match:float 1, match:xwayland 0

# remove rounding and shadow from tiling
windowrule = rounding 0, no_shadow on, match:float 0

# border color for focused floating windows
windowrule = border_color rgb($primary), match:focus 1, match:float 1

windowrule = float on, size 1200 800, match:tag float_md

# scratchpads
windowrule = tag +float_md, match:class kitty-scratch
windowrule = tag +float_md, match:class tui-monitor
windowrule = tag +float_md, match:class ^(tui-notes)$
windowrule = tag +float_md, match:class tui-notes-obsidian
windowrule = tag +float_md, match:class tui-email
windowrule = tag +float_md, match:class tui-rss
windowrule = tag +float_md, match:class tui-music
windowrule = tag +float_md, match:class tui-calendar
windowrule = tag +float_md, match:class tui-bookmarks
windowrule = tag +float_md, match:class ^($bitwarden_appid)$
windowrule = tag +float_md, match:class ^($bing_gpt_appid)$
windowrule = tag +float_md, match:class ^($chat_gpt_appid)$
windowrule = tag +float_md, match:class ^($gemini_appid)$
windowrule = tag +float_md, match:class ^($ollama_appid)$
windowrule = tag +float_md, match:class ^($openwebui_appid)$
windowrule = tag +float_md, match:class ^($ytmusic_appid)$
windowrule = tag +scratchpad, match:class kitty-scratch
windowrule = tag +scratchpad, match:class tui-monitor
windowrule = tag +scratchpad, match:class ^(tui-notes)$
windowrule = tag +scratchpad, match:class tui-notes-obsidian
windowrule = tag +scratchpad, match:class tui-email
windowrule = tag +scratchpad, match:class tui-rss
windowrule = tag +scratchpad, match:class tui-music
windowrule = tag +scratchpad, match:class tui-calendar
windowrule = tag +scratchpad, match:class tui-bookmarks
windowrule = tag +scratchpad, no_screen_share 1, match:class ^($bitwarden_appid)$
windowrule = tag +scratchpad, match:class ^($bing_gpt_appid)$
windowrule = tag +scratchpad, match:class ^($chat_gpt_appid)$
windowrule = tag +scratchpad, match:class ^($gemini_appid)$
windowrule = tag +scratchpad, match:class ^($ollama_appid)$
windowrule = tag +scratchpad, match:class ^($openwebui_appid)$
windowrule = tag +scratchpad, match:class ^($ytmusic_appid)$
windowrule = tag +scratchpad, float on, match:class ^([tT]hunar)$
windowrule = tag +scratchpad, match:class xwaylandvideobridge

# custom
windowrule = workspace special:scratchpads silent, match:class ^(xwaylandvideobridge)$
windowrule = float on, match:class ^(file-roller)$, match:title ^(Extracting Files).*
windowrule = float on, match:class ^(org.gnome.Calculator)$
windowrule = float on, no_follow_mouse on, move (7) ((monitor_h*1)-h-7), match:class ^(showmethekey-gtk)$
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = float on, match:class ^(org.freedesktop.impl.portal.desktop.kde)$
windowrule = workspace 4, match:class ^(Slack)$
windowrule = workspace 4, match:class ^(discord)$
windowrule = workspace 4, float on, match:class ^(discord)$, match:title (Discord Updater)
windowrule = float on, match:class com.gabm.satty
windowrule = workspace special:scratchpads silent, match:title (.com is sharing your screen.)$
windowrule = workspace special:scratchpads silent, match:title (.com is sharing a window.)$
# windowrule = workspace 1, class:^(google-chrome)$
windowrule = workspace 5, match:class ^(firefox)$
windowrule = workspace 8, match:class ^(brave-browser)$
windowrule = workspace 9, match:class ^(microsoft-edge)$
windowrule = no_blur on, match:class kitty-chill
windowrule = no_blur on, match:class footclient-chill
windowrule = no_blur on, match:class foot-chill

# rules for xwayland apps
windowrule = float on, rounding 0, no_anim on, no_blur on, no_shadow on, immediate on, idle_inhibit focus, match:xwayland 1
windowrule = tile on, match:class steam, match:title Steam, match:xwayland 1
windowrule = border_size 0, match:class steam, match:xwayland 1
# windowrule = move onscreen 0 0|xwayland:1
windowrule = float on, rounding 0, no_shadow on, immediate on, idle_inhibit focus, match:class .gamescope-wrapped

# TODO: add those rules on the fly when converting workspace to monocle
# windowrule = group set always, workspace:8
# windowrule = group lock always, workspace:8
# windowrule = group invade, workspace:8


#### LAYER
layerrule = blur on, blur_popups on, ignore_alpha 0.4, match:namespace quickshell:.*
layerrule = ignore_alpha 0.5, match:namespace quickshell:notifications-popups
# layerrule = noanim, quickshell:notifications


#### WORKSPACE

# disable removing gaps when maximized
workspace = f[1], gapsout:0, bordersize:0, rounding:0


#### ANIMATION

animation = windows, 1, 2, default
animation = windowsIn, 0
animation = layers, 1, 2, default
animation = layersIn, 0
animation = fade, 1, 2, default
animation = fadeIn, 0
animation = fadeLayersIn, 0
animation = fadePopupsIn, 0
animation = border, 1, 2, default
animation = borderangle, 0
animation = workspaces, 1, 2, default
animation = workspacesIn, 1, 2, default, fade
animation = workspacesOut, 1, 2, default, fade
animation = specialWorkspaceIn, 0
animation = monitorAdded, 1, 2, default
# animation = zoomFactor, 1, 2, default

