      root: ~/Projects/se/viz-omni
      layout: tiled

  - backend:
      root: ~/Projects/se/viz-omni/backend
      layout: tiled

  # <%- if @settings["workspaces"].split(',').include?("charts") || @settings["workspaces"].split(',').include?("stories") %>
  - frontend:
      root: ~/Projects/se/viz-omni/frontend
      layout: tiled
  # <%- end %>

  # <%- if @settings["workspaces"].split(',').include?("templates") %>
  - layout-editor:
      root: ~/Projects/se/viz-omni/frontend-neo/layout-editor
      layout: tiled
  # <%- end %>

  # <%- if @settings["workspaces"].split(',').include?("surveys") %>
  - pearson-surveys:
      root: ~/Projects/se/pearson-surveys
      layout: tiled

  - socialexplorer-surveys:
      root: ~/Projects/se/socialexplorer-surveys
      layout: tiled
  # <%- end %>

  # <%- if @settings["workspaces"].split(',').include?("microfrontends") %>
  - single-spa-root-html:
      root: ~/Projects/se/single-spa-demo/single-spa-root-html
